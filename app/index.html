<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f3ea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ワインエキスパート対策">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>ワインエキスパート対策</title>
    <link rel="manifest" href="./manifest.webmanifest?v=20260528-9">
    <link rel="stylesheet" href="./styles.css?v=20260528-9">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Wine Expert Drill</p>
          <h1>J.S.A.ワインエキスパート一次試験対策</h1>
        </div>
        <button class="icon-button" id="resetButton" type="button" aria-label="学習データを初期化">
          <span aria-hidden="true">↺</span>
        </button>
      </header>

      <section class="stats-strip" aria-label="学習状況">
        <div>
          <span id="roundProgress">0 / 0</span>
          <small>今回の進み具合</small>
        </div>
        <div>
          <span id="reviewCount">0</span>
          <small>復習リスト</small>
        </div>
        <div>
          <span id="missedCount">0</span>
          <small>間違い保存</small>
        </div>
      </section>

      <nav class="tabs" aria-label="画面切替">
        <button class="tab is-active" data-view="quizView" type="button">問題</button>
        <button class="tab" data-view="reviewView" type="button">復習</button>
        <button class="tab" data-view="analyticsView" type="button">分野</button>
      </nav>

      <section class="view is-active" id="quizView">
        <div class="control-row">
          <label>
            <span>出題範囲</span>
            <select id="categoryFilter"></select>
          </label>
          <label>
            <span>モード</span>
            <select id="modeSelect">
              <option value="all">全問題</option>
              <option value="review">復習優先</option>
              <option value="priority">重要度A優先</option>
              <option value="focus">重点復習</option>
              <option value="weak">苦手分野優先</option>
            </select>
          </label>
        </div>

        <article class="question-panel" aria-live="polite">
          <div class="question-meta">
            <span id="questionCategory">-</span>
            <span id="questionProgress">0 / 0</span>
          </div>
          <div class="question-tools">
            <button class="bookmark-button" id="bookmarkButton" type="button">復習に追加</button>
          </div>
          <h2 id="questionText">問題を読み込み中です</h2>
          <div class="choices" id="choices"></div>
          <div class="answer-box" id="answerBox" hidden>
            <p id="answerResult"></p>
            <div class="choice-notes" id="choiceNotes"></div>
          </div>
          <div class="action-row">
            <button class="secondary" id="skipButton" type="button">スキップ</button>
            <button class="primary" id="nextButton" type="button" hidden>次へ</button>
          </div>
        </article>
        <article class="result-panel" id="resultPanel" hidden>
          <p class="eyebrow">Result</p>
          <h2>今回の結果</h2>
          <div class="result-grid">
            <div>
              <span id="resultAnswered">0</span>
              <small>回答</small>
            </div>
            <div>
              <span id="resultAccuracy">0%</span>
              <small>正答率</small>
            </div>
            <div>
              <span id="resultWrong">0</span>
              <small>不正解</small>
            </div>
          </div>
          <button class="primary" id="restartRoundButton" type="button">もう一度解く</button>
        </article>
      </section>

      <section class="view" id="reviewView">
        <div class="section-head">
          <h2>復習リスト</h2>
          <button class="text-button" id="clearReviewButton" type="button">クリア</button>
        </div>
        <div class="list" id="missedList"></div>
      </section>

      <section class="view" id="analyticsView">
        <div class="section-head">
          <h2>苦手分野</h2>
          <span class="hint">低い順</span>
        </div>
        <div class="analytics-list" id="analyticsList"></div>
      </section>

    </main>

    <template id="missedItemTemplate">
      <article class="list-item">
        <div>
          <span class="pill"></span>
          <h3></h3>
          <p></p>
        </div>
        <button type="button">再挑戦</button>
      </article>
    </template>

    <script src="./questions.generated.js?v=20260528-9"></script>
    <script src="./question-packs/phase1-core.js?v=20260528-9"></script>
    <script src="./question-packs/phase1-regional-balance.js?v=20260528-9"></script>
    <script src="./question-packs/phase1-jsa-balance.js?v=20260528-9"></script>
    <script src="./question-packs/phase1-exam-style.js?v=20260528-9"></script>
    <script src="./app.js?v=20260528-9"></script>
  </body>
</html>
